baseURL = "https://basc-collaboration.github.io"
enableGitInfo = false # true: page modification date set by last git commit
enableRobotsTXT = true
hasCJKLanguage = true
locale = "en"
rssLimit = 10
title = "BaSc"
theme = "hugo-texademic"

[pagination]
pagerSize = 5

[taxonomies]
tags = "tags"
categories = "categories"
presenter = "presenter"

[params]
    theme="gruvbox"
    dateFormat = "2 January 2006"
    front_news = 10
    #home_banner = "images/some_image.png"

    title="BaSc Collaboration"
    author = "BaSc Collaboration"
    description = "Webpage for Baryon Scattering (BaSc) Collaboration"
    footnote = """
    Powered by  <a class=link href=https://gohugo.io target=_blank rel=noopener>Hugo</a> | 
    Theme <a class=link href=https://github.com/walkloud/hugo-texademic target=_blank rel=noopener>TeXaDemic</a>
    """
    customCSS = []
    customJS = []
    emphasisWithDots = true
    toc = true
    rootFontSize = "105%"
    math = true
    enableDuckDuckGoSearchBox = true
    numberedSubtitles = true
    default_portrait = "images/anonymous_person.png"
    memberClass = false

[[menus.main]]
    name = 'BaSc'
    params = { icon='images/basc.jpg' }
    pageRef = '/'
    weight = 10
[[menus.main]]
    name = 'About'
    pageRef = '/about'
    weight = 20
[[menus.main]]
    name = 'News'
    pageRef = '/news'
    weight = 30
